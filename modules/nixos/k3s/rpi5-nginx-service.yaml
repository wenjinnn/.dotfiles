# Service 保持不变（无 selector 的手动 Service）
apiVersion: v1
kind: Service
metadata:
  name: rpi5-nginx-service
  namespace: default
spec:
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000

---
# 使用 EndpointSlice 替代 Endpoints
apiVersion: discovery.k8s.io/v1
kind: EndpointSlice
metadata:
  name: rpi5-nginx-service-slice   # 可以自定义，但建议关联 Service 名
  namespace: default
  labels:
    # 这个标签必须设置，用来关联对应的 Service
    kubernetes.io/service-name: rpi5-nginx-service
addressType: IPv4
endpoints:
  - addresses:
      - "100.64.0.1"       # 宿主机的 IP
    conditions:
      ready: true          # 表示该端点已就绪
ports:
  - name: ""               # 可选，与 Service 中的 port 名称对应（本例没有 name）
    protocol: TCP
    port: 8000

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: rpi5-hosts-ingress
spec:
  ingressClassName: traefik
  rules:
  - host: nextcloud.ts.wenjin.me
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: rpi5-nginx-service
            port:
              number: 8000
